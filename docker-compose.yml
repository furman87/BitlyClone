services:
  app:
    build:
      context: ./ShortLinks
    container_name: shortlinks-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=shortlinks;Username=shortlinks;Password=${POSTGRES_PASSWORD:-change-me-now}
      PublicBaseUrl: ${PUBLIC_BASE_URL:-https://go.fu87.app}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: shortlinks-db
    environment:
      POSTGRES_DB: shortlinks
      POSTGRES_USER: shortlinks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-now}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlinks -d shortlinks"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
